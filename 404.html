<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Telawat</title>
    <!--
      Single Page Application (SPA) redirect script for GitHub Pages.

      GitHub Pages serves a 404 when a user navigates directly to a subpath
      (e.g. /privacy-policy). This page intercepts that 404 and redirects
      back to the index.html with the path encoded as a query parameter.
      The index.html then decodes it and passes control to Vue Router.

      Source: https://github.com/rafgraph/spa-github-pages
    -->
    <script>
      var segmentCount = 1; // Set to 0 for user/org pages, 1 for project pages.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?p=/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
